<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全链路数据资产监控平台</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus@2.5.6/dist/index.css">
  <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus@2.5.6/dist/index.full.min.js"></script>
  <script src="https://unpkg.com/@antv/g6@4.8.24/dist/g6.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f7fa}
    .app{flex-direction:column;height:100vh;display:flex}
    .header{background:#fff;padding:16px 24px;box-shadow:0 2px 8px rgba(0,0,0,.08);z-index:100}
    .title{font-size:20px;font-weight:600;color:#303133;margin-bottom:12px}
    .search-bar{display:flex;gap:12px}
    .main{display:flex;flex:1;overflow:hidden}
    .left-nav{width:280px;background:#fff;border-right:1px solid #e4e7ed;overflow-y:auto;padding:16px}
    .nav-item{margin-bottom:8px;cursor:pointer;border-radius:6px;transition:all .2s;padding:10px 12px}
    .nav-item:hover{background:#f5f7fa}
    .nav-item.active{background:#ecf5ff;color:#409eff}
    .nav-label{font-weight:500}
    .nav-sub{font-size:13px;color:#909399;padding:4px 12px}
    .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
    .dot-online{background:#67c23a}
    .dot-warning{background:#e6a23c}
    .dot-error{background:#f56c6c}
    .right-panel{flex:1;overflow-y:auto;padding:20px}
    .card{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
    .card-title{font-size:16px;font-weight:600;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f0f0f0}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}
    .stat-item{padding:12px;background:#f9fafb;border-radius:6px;text-align:center}
    .stat-value{font-size:24px;font-weight:600;color:#409eff}
    .stat-label{font-size:12px;color:#909399;margin-top:4px}
    .gauge-wrap{display:flex;gap:24px;justify-content:center;padding:16px}
    .gauge-item{text-align:center}
    .gauge-label{font-size:12px;color:#606266;margin-top:8px}
    .graph-box{width:100%;height:500px;background:#fafafa;border-radius:8px;border:1px solid #eee}
    .info-table{width:100%}
    .info-table td{padding:10px 12px;border-bottom:1px solid #f0f0f0}
    .info-table td:first-child{width:120px;color:#909399;font-size:13px}
    .info-table td:last-child{color:#303133}
    .empty{text-align:center;padding:60px 20px;color:#909399}
    .empty-icon{font-size:48px;margin-bottom:16px}
  </style>
</head>
<body>
<div id="app" class="app">
  <header class="header">
    <div class="title">🌊 全链路数据资产监控平台</div>
    <div class="search-bar">
      <el-input v-model="search" placeholder="搜索表名/字段名..." clearable @change="doSearch"></el-input>
    </div>
  </header>
  <div class="main">
    <aside class="left-nav">
      <template v-for="srv in servers" :key="srv.id">
        <div class="nav-item" :class="{active:selType==='srv'&&selId===srv.id}" @click="selectSrv(srv)">
          <div class="nav-label"><span class="status-dot" :class="'dot-'+srv.status"></span>{{srv.name}}</div>
          <div class="nav-sub">{{srv.ip}}</div>
        </div>
        <template v-if="selType==='srv'&&selId===srv.id" v-for="app in getApps(srv.id)" :key="app.id">
          <div class="nav-item" :class="{active:selType==='app'&&selId===app.id}" @click="selectApp(app)" style="padding-left:24px">
            <div class="nav-label"><span class="status-dot" :class="'dot-'+app.status"></span>{{app.name}}</div>
            <div class="nav-sub">{{app.owner}} | v{{app.version}}</div>
          </div>
          <template v-if="selType==='app'&&selId===app.id" v-for="db in getDbs(app.id)" :key="db.id">
            <div class="nav-item" :class="{active:selType==='db'&&selId===db.id}" @click="selectDb(db)" style="padding-left:40px">
              <div class="nav-label"><span class="status-dot" :class="'dot-'+db.status"></span>{{db.name}}</div>
              <div class="nav-sub">{{db.type}} | {{db.size}}</div>
            </div>
            <template v-if="selType==='db'&&selId===db.id" v-for="tbl in getTables(db.id)" :key="tbl.id">
              <div class="nav-item" :class="{active:selType==='tbl'&&selId===tbl.id}" @click="selectTbl(tbl)" style="padding-left:56px">
                <div class="nav-label"><span class="status-dot" :class="'dot-'+tbl.status"></span>{{tbl.name}}</div>
                <div class="nav-sub">{{fmtNum(tbl.rows)}}行 | {{tbl.updateFreq}}</div>
              </div>
              <template v-if="selType==='tbl'&&selId===tbl.id" v-for="fld in getFields(tbl.id)" :key="fld.id">
                <div class="nav-item" :class="{active:selType==='fld'&&selId===fld.id}" @click="selectFld(fld)" style="padding-left:72px">
                  <div class="nav-label">{{fld.name}}</div>
                  <div class="nav-sub">{{fld.type}} | {{fld.description}}</div>
                </div>
              </template>
            </template>
          </template>
        </template>
      </template>
    </aside>
    <main class="right-panel">
      <!-- 服务器详情 -->
      <template v-if="selType==='srv'&&curSrv">
        <div class="card">
          <div class="card-title">📊 {{curSrv.name}} - 服务器状态</div>
          <div class="gauge-wrap">
            <div class="gauge-item">
              <el-progress type="dashboard" :percentage="curSrv.cpu" :color="gaugeColor(curSrv.cpu)" :width="100">
                <template #default><span class="stat-value">{{curSrv.cpu}}%</span></template>
              </el-progress>
              <div class="gauge-label">CPU 使用率</div>
            </div>
            <div class="gauge-item">
              <el-progress type="dashboard" :percentage="curSrv.memory" :color="gaugeColor(curSrv.memory)" :width="100">
                <template #default><span class="stat-value">{{curSrv.memory}}%</span></template>
              </el-progress>
              <div class="gauge-label">内存使用率</div>
            </div>
          </div>
          <el-descriptions :column="2" border style="margin-top:20px">
            <el-descriptions-item label="IP地址">{{curSrv.ip}}</el-descriptions-item>
            <el-descriptions-item label="操作系统">{{curSrv.os}}</el-descriptions-item>
            <el-descriptions-item label="机房位置">{{curSrv.location}}</el-descriptions-item>
            <el-descriptions-item label="状态"><el-tag :type="statusType(curSrv.status)">{{curSrv.status}}</el-tag></el-descriptions-item>
          </el-descriptions>
        </div>
        <div class="card">
          <div class="card-title">📦 关联应用 ({{getApps(curSrv.id).length}})</div>
          <el-table :data="getApps(curSrv.id)" stripe size="small">
            <el-table-column prop="name" label="应用名称"></el-table-column>
            <el-table-column prop="owner" label="负责人"></el-table-column>
            <el-table-column prop="version" label="版本" width="80"></el-table-column>
            <el-table-column label="状态">
              <template #default="{row}"><el-tag size="small" :type="statusType(row.status)">{{row.status}}</el-tag></template>
            </el-table-column>
          </el-table>
        </div>
      </template>
      <!-- 应用详情 -->
      <template v-if="selType==='app'&&curApp">
        <div class="card">
          <div class="card-title">应用详情 - {{curApp.name}}</div>
          <el-descriptions :column="2" border>
            <el-descriptions-item label="负责人">{{curApp.owner}}</el-descriptions-item>
            <el-descriptions-item label="版本">{{curApp.version}}</el-descriptions-item>
            <el-descriptions-item label="状态"><el-tag :type="statusType(curApp.status)">{{curApp.status}}</el-tag></el-descriptions-item>
            <el-descriptions-item label="描述" :span="2">{{curApp.description}}</el-descriptions-item>
          </el-descriptions>
        </div>
      </template>
      <!-- 数据库详情 -->
      <template v-if="selType==='db'&&curDb">
        <div class="card">
          <div class="card-title">📊 {{curDb.name}} - 数据库</div>
          <div class="stat-grid">
            <div class="stat-item"><div class="stat-value">{{curDb.connections}}</div><div class="stat-label">连接数</div></div>
            <div class="stat-item"><div class="stat-value">{{curDb.size}}</div><div class="stat-label">大小</div></div>
            <div class="stat-item"><div class="stat-value">{{getTables(curDb.id).length}}</div><div class="stat-label">表数量</div></div>
            <div class="stat-item"><div class="stat-value">{{errTables}}</div><div class="stat-label">异常表</div></div>
          </div>
        </div>
        <div class="card">
          <div class="card-title">📋 表列表 ({{getTables(curDb.id).length}})</div>
          <el-table :data="getTables(curDb.id)" stripe size="small">
            <el-table-column prop="name" label="表名"></el-table-column>
            <el-table-column prop="description" label="描述"></el-table-column>
            <el-table-column prop="rows" label="行数" :formatter="r=>fmtNum(r.rows)"></el-table-column>
            <el-table-column prop="updateFreq" label="更新频率" width="100"></el-table-column>
            <el-table-column label="状态" width="80">
              <template #default="{row}"><el-tag size="small" :type="statusType(row.status)">{{row.status}}</el-tag></template>
            </el-table-column>
          </el-table>
        </div>
      </template>
      <!-- 表详情+血缘图 -->
      <template v-if="selType==='tbl'&&curTbl">
        <div class="card">
          <div class="card-title">📊 {{curTbl.name}} - 表详情</div>
          <el-descriptions :column="2" border>
            <el-descriptions-item label="表名">{{curTbl.name}}</el-descriptions-item>
            <el-descriptions-item label="描述">{{curTbl.description}}</el-descriptions-item>
            <el-descriptions-item label="行数">{{fmtNum(curTbl.rows)}}</el-descriptions-item>
            <el-descriptions-item label="更新频率">{{curTbl.updateFreq}}</el-descriptions-item>
            <el-descriptions-item label="最后更新">{{curTbl.lastUpdate}}</el-descriptions-item>
            <el-descriptions-item label="状态"><el-tag :type="statusType(curTbl.status)">{{curTbl.status}}</el-tag></el-descriptions-item>
          </el-descriptions>
        </div>
        <div class="card">
          <div class="card-title">🔗 字段列表 ({{getFields(curTbl.id).length}})</div>
          <el-table :data="getFields(curTbl.id)" stripe size="small">
            <el-table-column prop="name" label="字段名" width="150"></el-table-column>
            <el-table-column prop="type" label="类型" width="120"></el-table-column>
            <el-table-column prop="description" label="描述"></el-table-column>
            <el-table-column label="主键" width="60">
              <template #default="{row}"><el-tag v-if="row.isKey" size="small" type="warning">PK</el-tag></template>
            </el-table-column>
          </el-table>
        </div>
        <div class="card">
          <div class="card-title">🔗 血缘关系图</div>
          <el-radio-group v-model="lineView" size="small" style="margin-bottom:12px">
            <el-radio-button value="in">入向血缘</el-radio-button>
            <el-radio-button value="out">出向血缘</el-radio-button>
          </el-radio-group>
          <div id="g6graph" class="graph-box"></div>
        </div>
      </template>
      <!-- 字段详情 -->
      <template v-if="selType==='fld'&&curFld">
        <div class="card">
          <div class="card-title">📍 {{curFld.name}} - 字段详情</div>
          <el-descriptions :column="2" border>
            <el-descriptions-item label="字段名">{{curFld.name}}</el-descriptions-item>
            <el-descriptions-item label="类型">{{curFld.type}}</el-descriptions-item>
            <el-descriptions-item label="描述">{{curFld.description}}</el-descriptions-item>
            <el-descriptions-item label="主键"><el-tag :type="curFld.isKey?'warning':'info'">{{curFld.isKey?'是':'否'}}</el-tag></el-descriptions-item>
          </el-descriptions>
        </div>
        <div class="card">
          <div class="card-title">⚠️ 字段影响分析</div>
          <el-alert v-if="upStreams.length===0&&downStreams.length===0" type="info" :closable="false" show-icon>暂无上下游血缘关系</el-alert>
          <div v-else>
            <div v-if="upStreams.length>0" style="margin-bottom:12px">
              <div style="color:#909399;margin-bottom:8px">⬆️ 上游影响 (修改此字段会影响):</div>
              <el-tag v-for="t in upStreams" :key="t" style="margin-right:8px">{{t}}</el-tag>
            </div>
            <div v-if="downStreams.length>0">
              <div style="color:#909399;margin-bottom:8px">⬇️ 下游被依赖:</div>
              <el-tag v-for="t in downStreams" :key="t" type="warning" style="margin-right:8px">{{t}}</el-tag>
            </div>
          </div>
        </div>
      </template>
      <!-- 空状态 -->
      <template v-if="!selType">
        <div class="empty">
          <div class="empty-icon">🔍</div>
          <p>从左侧选择一个节点开始探索</p>
          <p style="font-size:13px;margin-top:8px">支持：服务器 → 应用 → 数据库 → 表 → 字段 的5层穿透</p>
        </div>
      </template>
    </main>
  </div>
</div>
<script>
const{createApp,ref,computed,watch,nextTick}=Vue;
const app=createApp({
  setup(){
    const search=ref('');
    const selType=ref('');
    const selId=ref('');
    const selSrv=ref(null);
    const selApp=ref(null);
    const selDb=ref(null);
    const selTbl=ref(null);
    const selFld=ref(null);
    const lineView=ref('in');
    const data=ref(null);
    const graphRef=ref(null);
    
    const servers=computed(()=>data.value?.servers||[]);
    const curSrv=computed(()=>selSrv.value);
    const curApp=computed(()=>selApp.value);
    const curDb=computed(()=>selDb.value);
    const curTbl=computed(()=>selTbl.value);
    const curFld=computed(()=>selFld.value);
    const errTables=computed(()=>getTables(selDb.value?.id).filter(t=>t.status==='error').length);
    
    const upStreams=computed(()=>{
      if(!data.value||!curFld.value)return[];
      return data.value.tableLineage.filter(l=>l.toFields.includes(curFld.value.name)).map(l=>{
        const t=data.value.tables.find(t=>t.id===l.fromTableId);
        return t?t.name:l.fromTableId;
      });
    });
    const downStreams=computed(()=>{
      if(!data.value||!curFld.value)return[];
      return data.value.tableLineage.filter(l=>l.fromFields.includes(curFld.value.name)).map(l=>{
        const t=data.value.tables.find(t=>t.id===l.toTableId);
        return t?t.name:l.toTableId;
      });
    });
    
    function getApps(srvId){return data.value?.applications?.filter(a=>a.serverId===srvId)||[]}
    function getDbs(appId){return data.value?.databases?.filter(d=>d.appId===appId)||[]}
    function getTables(dbId){return data.value?.tables?.filter(t=>t.dbId===dbId)||[]}
    function getFields(tblId){return data.value?.fields?.filter(f=>f.tableId===tblId)||[]}
    function fmtNum(n){return n?.toLocaleString()||0}
    function statusType(s){
      return{online:'success',warning:'warning',error:'danger'}[s]||'info';
    }
    function gaugeColor(v){
      if(v<60)return'#67c23a';
      if(v<80)return'#e6a23c';
      return'#f56c6c';
    }
    function doSearch(){console.log('search:',search.value)}
    
    function selectSrv(srv){
      selType.value='srv';selId.value=srv.id;selSrv.value=srv;
      selApp.value=null;selDb.value=null;selTbl.value=null;selFld.value=null;
    }
    function selectApp(app){
      selType.value='app';selId.value=app.id;selApp.value=app;
      selDb.value=null;selTbl.value=null;selFld.value=null;
    }
    function selectDb(db){
      selType.value='db';selId.value=db.id;selDb.value=db;
      selTbl.value=null;selFld.value=null;
    }
    function selectTbl(tbl){
      selType.value='tbl';selId.value=tbl.id;selTbl.value=tbl;selFld.value=null;
      nextTick(()=>renderGraph());
    }
    function selectFld(fld){
      selType.value='fld';selId.value=fld.id;selFld.value=fld;
    }
    
    function renderGraph(){
      if(!data.value||!curTbl.value||!window.G6)return;
      const container=document.getElementById('g6graph');
      if(!container)return;
      if(graphRef.value){graphRef.value.destroy();graphRef.value=null;}
      const center=curTbl.value;
      const nodes=[{
        id:center.id,label:center.name,type:'circle',size:60,
        style:{fill:'#409eff',stroke:'#337ecc',lineWidth:2},
        labelCfg:{style:{fill:'#fff',fontSize:12}}
      }];
      const edges=[];
      const related=[];
      if(lineView.value==='in'){
        data.value.tableLineage.filter(l=>l.toTableId===center.id).forEach(l=>{
          const t=data.value.tables.find(t=>t.id===l.fromTableId);
          if(t)related.push({t,rel:l,d:'in'});
        });
      }else{
        data.value.tableLineage.filter(l=>l.fromTableId===center.id).forEach(l=>{
          const t=data.value.tables.find(t=>t.id===l.toTableId);
          if(t)related.push({t,rel:l,d:'out'});
        });
      }
      related.forEach((item,idx)=>{
        const angle=(lineView.value==='in'?-Math.PI/2:Math.PI/2)+(idx-(related.length-1)/2)*0.8;
        const r=160;
        nodes.push({
          id:item.t.id,label:item.t.name,type:'circle',size:50,
          style:{fill:item.t.status==='error'?'#f56c6c':item.t.status==='warning'?'#e6a23c':'#909399',stroke:'#666'},
          labelCfg:{style:{fill:'#fff',fontSize:11}},
          x:250+r*Math.cos(angle),y:250+r*Math.sin(angle)
        });
        edges.push({
          source:lineView.value==='in'?item.t.id:center.id,
          target:lineView.value==='in'?center.id:item.t.id,
          label:item.rel.relationship,
          style:{endArrow:{path:G6.Arrow.triangle(6,8,0),fill:'#c0c4cc'}}
        });
      });
      const graph=new G6.Graph({
        container:'g6graph',width:container.offsetWidth||800,height:500,
        fitView:true,animate:true,
        defaultNode:{type:'circle'},
        defaultEdge:{type:'polyline',style:{stroke:'#c0c4cc',lineWidth:2}},
        modes:{default:['drag-canvas','zoom-canvas','drag-node']}
      });
      graph.data({nodes,edges});
      graph.render();
      graphRef.value=graph;
      graph.on('node:click',e=>{
        const id=e.item.getModel().id;
        const tbl=data.value.tables.find(t=>t.id===id);
        if(tbl)selectTbl(tbl);
      });
    }
    
    watch(lineView,()=>{if(selType.value==='tbl')renderGraph();});
    
    return{search,selType,selId,curSrv,curApp,curDb,curTbl,curFld,
      servers,errTables,lineView,upStreams,downStreams,
      getApps,getDbs,getTables,getFields,fmtNum,statusType,gaugeColor,doSearch,
      selectSrv,selectApp,selectDb,selectTbl,selectFld};
  }
});
app.use(ElementPlus);
app.mount('#app');
fetch('./data/mock-data.json').then(r=>r.json()).then(d=>data.value=d);
</script>
</body>
</html>
